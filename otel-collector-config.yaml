receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 1024
  probabilistic_sampler:
    sampling_percentage: 10
  memory_limiter:
    check_interval: 1s
    limit_mib: 400
    spike_limit_mib: 100

exporters:
  prometheusremotewrite:
    endpoint: ${GRAFANA_METRICS_ENDPOINT}
    headers:
      Authorization: "Basic ${GRAFANA_METRICS_AUTH}"
    resource_to_telemetry_conversion:
      enabled: true

  otlp/traces:
    endpoint: ${GRAFANA_TRACES_ENDPOINT}
    headers:
      Authorization: "Basic ${GRAFANA_TRACES_AUTH}"
    tls:
      insecure: false

  otlp_http/logs:
    endpoint: ${GRAFANA_LOGS_ENDPOINT}
    headers:
      Authorization: "Basic ${GRAFANA_LOGS_AUTH}"

  debug:
    verbosity: detailed

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [prometheusremotewrite]
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlp/traces, debug]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlp_http/logs]
