version: '3.8'

services:
  # === 개발용 Redis (선택적) ===
  redis:
    image: redis:7-alpine
    container_name: almondyoung-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles: ["dev"]  # 개발환경에서만 사용

  # === 핵심 서비스들 ===
  wms:
    build:
      context: .
      dockerfile: apps/wms/Dockerfile
    container_name: almondyoung-wms
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=3010
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
    ports:
      - "3010:3010"
    env_file:
      - .env
    restart: unless-stopped

  pim:
    build:
      context: .
      dockerfile: apps/pim/Dockerfile
    container_name: almondyoung-pim
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=3020
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
    ports:
      - "3020:3020"
    env_file:
      - .env
    restart: unless-stopped

  user-service:
    build:
      context: .
      dockerfile: apps/user-service/Dockerfile
    container_name: almondyoung-user-service
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=3030
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
    ports:
      - "3030:3030"
    env_file:
      - .env
    restart: unless-stopped

  # === 로컬 Kafka (개발용 - Confluent Cloud 대신) ===
  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: almondyoung-kafka
    ports:
      - '9092:9092'
    environment:
      # KRaft settings
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://localhost:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      CLUSTER_ID: '5Yr1SIgYQz-b-dgRabWx4g'

      # Topic settings
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    profiles: ["dev"]  # 개발환경에서만 사용

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: almondyoung-kafka-ui
    ports:
      - '8081:8080'
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      - kafka
    profiles: ["dev"]

  # === 선택적 서비스들 ===
  wallet:
    build:
      context: .
      dockerfile: apps/wallet/Dockerfile
    container_name: almondyoung-wallet
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=3040
      - DATABASE_URL=${DATABASE_URL}
    ports:
      - "3040:3040"
    env_file:
      - .env
    restart: unless-stopped
    profiles: ["full"]

  membership:
    build:
      context: .
      dockerfile: apps/membership/Dockerfile
    container_name: almondyoung-membership
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=3050
      - DATABASE_URL=${DATABASE_URL}
    ports:
      - "3050:3050"
    env_file:
      - .env
    restart: unless-stopped
    profiles: ["full"]

  notification:
    build:
      context: .
      dockerfile: apps/notification/Dockerfile
    container_name: almondyoung-notification
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=3060
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
    ports:
      - "3060:3060"
    env_file:
      - .env
    restart: unless-stopped
    profiles: ["full"]

  channel-adapter:
    build:
      context: .
      dockerfile: apps/channel-adapter/Dockerfile
    container_name: almondyoung-channel-adapter
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=3070
      - DATABASE_URL=${DATABASE_URL}
      - KAFKA_BROKERS=${KAFKA_BROKERS:-kafka:9092}
      - KAFKA_API_KEY=${KAFKA_API_KEY}
      - KAFKA_API_SECRET=${KAFKA_API_SECRET}
    ports:
      - "3070:3070"
    env_file:
      - .env
    restart: unless-stopped
    profiles: ["full"]

networks:
  default:
    name: almondyoung_network
