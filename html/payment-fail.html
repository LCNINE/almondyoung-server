<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>결제 실패</title>
    <style>
      body {
        font-family: 'Pretendard', sans-serif;
        background: linear-gradient(135deg, #ff6b6b 0%, #ee5a52 100%);
        margin: 0;
        padding: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .container {
        background: white;
        border-radius: 20px;
        padding: 40px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        text-align: center;
        max-width: 500px;
        width: 90%;
      }
      .fail-icon {
        width: 80px;
        height: 80px;
        background: #f44336;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 20px;
        animation: shake 0.6s ease-out;
      }
      .fail-icon::after {
        content: '✕';
        color: white;
        font-size: 40px;
        font-weight: bold;
      }
      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-5px);
        }
        75% {
          transform: translateX(5px);
        }
      }
      h1 {
        color: #333;
        margin-bottom: 10px;
        font-size: 28px;
      }
      .subtitle {
        color: #666;
        margin-bottom: 30px;
        font-size: 16px;
      }
      .error-info {
        background: #ffebee;
        border: 1px solid #ffcdd2;
        border-radius: 10px;
        padding: 20px;
        margin: 20px 0;
        text-align: left;
      }
      .error-title {
        color: #c62828;
        font-weight: 600;
        margin-bottom: 10px;
      }
      .error-message {
        color: #666;
        line-height: 1.5;
      }
      .buttons {
        margin-top: 30px;
      }
      .btn {
        display: inline-block;
        padding: 12px 24px;
        margin: 0 10px;
        border: none;
        border-radius: 8px;
        text-decoration: none;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
      }
      .btn-primary {
        background: #2196f3;
        color: white;
      }
      .btn-primary:hover {
        background: #1976d2;
        transform: translateY(-2px);
      }
      .btn-secondary {
        background: #6c757d;
        color: white;
      }
      .btn-secondary:hover {
        background: #5a6268;
        transform: translateY(-2px);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="fail-icon"></div>
      <h1>결제에 실패했습니다</h1>
      <p class="subtitle">결제 처리 중 문제가 발생했습니다.</p>

      <div class="error-info">
        <div class="error-title">실패 사유</div>
        <div class="error-message" id="errorMessage">
          결제가 취소되었거나 오류가 발생했습니다.<br />
          다시 시도하거나 다른 결제 수단을 이용해 주세요.
        </div>
      </div>

      <div class="buttons">
        <a href="../html/test-dashboard.html" class="btn btn-secondary"
          >테스트 대시보드</a
        >
        <button onclick="retryPayment()" class="btn btn-primary">
          다시 시도
        </button>
      </div>
    </div>

    <script>
      // URL 파라미터에서 오류 정보 추출
      const urlParams = new URLSearchParams(window.location.search);
      const errorCode = urlParams.get('code');
      const errorMessage = urlParams.get('message');
      const intentId = urlParams.get('intentId');

      // 페이지 로드 시 오류 정보 표시
      window.addEventListener('load', () => {
        if (errorMessage) {
          document.getElementById('errorMessage').innerHTML =
            `<strong>오류 코드:</strong> ${errorCode || 'UNKNOWN'}<br>
             <strong>오류 메시지:</strong> ${decodeURIComponent(errorMessage)}`;
        }
      });

      // 결제 재시도
      function retryPayment() {
        if (intentId) {
          // 같은 Intent로 다시 체크아웃 페이지로 이동
          window.location.href = `../html/checkout.html?intentId=${intentId}`;
        } else {
          // Intent ID가 없으면 테스트 대시보드로 이동
          window.location.href = '../html/test-dashboard.html';
        }
      }
    </script>
  </body>
</html>
