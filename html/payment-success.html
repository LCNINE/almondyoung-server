<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>결제 성공</title>
    <style>
      body {
        font-family: 'Pretendard', sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        margin: 0;
        padding: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .container {
        background: white;
        border-radius: 20px;
        padding: 40px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        text-align: center;
        max-width: 500px;
        width: 90%;
      }
      .success-icon {
        width: 80px;
        height: 80px;
        background: #4caf50;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 20px;
        animation: bounce 0.6s ease-out;
      }
      .success-icon::after {
        content: '✓';
        color: white;
        font-size: 40px;
        font-weight: bold;
      }
      @keyframes bounce {
        0% {
          transform: scale(0);
        }
        50% {
          transform: scale(1.1);
        }
        100% {
          transform: scale(1);
        }
      }
      h1 {
        color: #333;
        margin-bottom: 10px;
        font-size: 28px;
      }
      .subtitle {
        color: #666;
        margin-bottom: 30px;
        font-size: 16px;
      }
      .payment-info {
        background: #f8f9fa;
        border-radius: 10px;
        padding: 20px;
        margin: 20px 0;
        text-align: left;
      }
      .info-row {
        display: flex;
        justify-content: space-between;
        margin-bottom: 10px;
        padding: 5px 0;
      }
      .info-row:last-child {
        margin-bottom: 0;
        border-top: 1px solid #ddd;
        padding-top: 15px;
        font-weight: bold;
        color: #333;
      }
      .info-label {
        color: #666;
        font-weight: 500;
      }
      .info-value {
        color: #333;
        font-weight: 600;
      }
      .amount {
        color: #4caf50;
        font-size: 18px;
      }
      .buttons {
        margin-top: 30px;
      }
      .btn {
        display: inline-block;
        padding: 12px 24px;
        margin: 0 10px;
        border: none;
        border-radius: 8px;
        text-decoration: none;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
      }
      .btn-primary {
        background: #4caf50;
        color: white;
      }
      .btn-primary:hover {
        background: #45a049;
        transform: translateY(-2px);
      }
      .btn-secondary {
        background: #6c757d;
        color: white;
      }
      .btn-secondary:hover {
        background: #5a6268;
        transform: translateY(-2px);
      }
      .loading {
        display: none;
        margin: 20px 0;
      }
      .spinner {
        border: 3px solid #f3f3f3;
        border-top: 3px solid #4caf50;
        border-radius: 50%;
        width: 30px;
        height: 30px;
        animation: spin 1s linear infinite;
        margin: 0 auto;
      }
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="success-icon"></div>
      <h1>결제가 완료되었습니다!</h1>
      <p class="subtitle">안전하게 결제가 처리되었습니다.</p>

      <div class="payment-info">
        <div class="info-row">
          <span class="info-label">주문번호:</span>
          <span class="info-value" id="orderId">-</span>
        </div>
        <div class="info-row">
          <span class="info-label">결제수단:</span>
          <span class="info-value">Toss Payments</span>
        </div>
        <div class="info-row">
          <span class="info-label">결제키:</span>
          <span class="info-value" id="paymentKey">-</span>
        </div>
        <div class="info-row">
          <span class="info-label">결제금액:</span>
          <span class="info-value amount" id="amount">-</span>
        </div>
      </div>

      <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>결제 정보를 확인하는 중...</p>
      </div>

      <div class="buttons">
        <a href="../html/test-dashboard.html" class="btn btn-secondary"
          >테스트 대시보드</a
        >
        <button onclick="confirmPayment()" class="btn btn-primary">
          결제 확인
        </button>
      </div>
    </div>

    <script>
      const API_BASE = 'http://localhost:5000';

      // URL 파라미터에서 결제 정보 추출
      const urlParams = new URLSearchParams(window.location.search);
      const intentId = urlParams.get('intentId');
      const orderId = urlParams.get('orderId');
      const paymentKey = urlParams.get('paymentKey');
      const amount = urlParams.get('amount');

      // 페이지 로드 시 정보 표시
      window.addEventListener('load', () => {
        document.getElementById('orderId').textContent =
          orderId || intentId || '-';
        document.getElementById('paymentKey').textContent = paymentKey || '-';
        document.getElementById('amount').textContent = amount
          ? `₩${parseInt(amount).toLocaleString()}`
          : '-';
      });

      // 결제 확인 (서버에 최종 승인 요청)
      async function confirmPayment() {
        if (!intentId || !paymentKey) {
          alert('결제 정보가 부족합니다.');
          return;
        }

        document.getElementById('loading').style.display = 'block';

        try {
          const response = await fetch(
            `${API_BASE}/v2/payments/intents/${intentId}/execute`,
            {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                provider: 'TOSS',
                paymentKey: paymentKey,
              }),
            },
          );

          if (response.ok) {
            const result = await response.json();
            console.log('결제 확인 완료:', result);
            alert('결제가 성공적으로 확인되었습니다!');
          } else {
            const error = await response.json();
            console.error('결제 확인 실패:', error);
            alert(
              '결제 확인 중 오류가 발생했습니다: ' +
                (error.message || '알 수 없는 오류'),
            );
          }
        } catch (error) {
          console.error('결제 확인 중 네트워크 오류:', error);
          alert('네트워크 오류가 발생했습니다.');
        } finally {
          document.getElementById('loading').style.display = 'none';
        }
      }
    </script>
  </body>
</html>
