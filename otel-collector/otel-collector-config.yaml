receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024

exporters:
  # Jaeger로 트레이스 전송
  otlp/jaeger:
    endpoint: ${JAEGER_ENDPOINT}
    tls:
      insecure: true

  # Prometheus가 scrape할 수 있도록 메트릭 노출
  prometheus:
    endpoint: 0.0.0.0:8889
    namespace: otel

connectors:
  # 트레이스에서 메트릭 자동 생성 (요청 수, 지연시간 등)
  spanmetrics:
    histogram:
      explicit:
        buckets: [5ms, 10ms, 25ms, 50ms, 100ms, 250ms, 500ms, 1s, 2.5s, 5s, 10s]
    dimensions:
      - name: http.method
      - name: http.status_code

service:
  pipelines:
    # 트레이스 파이프라인
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/jaeger, spanmetrics]

    # 메트릭 파이프라인 (spanmetrics에서 생성된 메트릭)
    metrics:
      receivers: [spanmetrics]
      processors: [batch]
      exporters: [prometheus]
