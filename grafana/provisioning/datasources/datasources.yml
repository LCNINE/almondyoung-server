apiVersion: 1

datasources:
  # Prometheus - 메트릭 조회
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus.railway.internal:9090
    isDefault: true
    editable: false

  # Jaeger - 트레이스 조회
  - name: Jaeger
    type: jaeger
    access: proxy
    url: http://jaeger.railway.internal:16686
    editable: false
