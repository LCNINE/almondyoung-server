<!--@layout(/layout/basic/main.html)-->
<style>
  :root {
    --bg-start: #f6f1e8;
    --bg-end: #e6f1f0;
    --ink: #1b1d1f;
    --muted: #5c646b;
    --accent: #1f7a6b;
    --accent-strong: #14584d;
    --card: #ffffff;
    --border: rgba(27, 29, 31, 0.08);
    --shadow: 0 18px 45px rgba(17, 24, 39, 0.12);
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: "Pretendard", "SUIT", "Noto Sans KR", sans-serif;
    color: var(--ink);
    background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
      radial-gradient(circle at 15% 10%, rgba(31, 122, 107, 0.12), transparent 45%),
      radial-gradient(circle at 85% 30%, rgba(31, 122, 107, 0.08), transparent 40%);
    pointer-events: none;
  }

  .page {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px 20px;
    min-height: 100vh;
  }

  .card {
    width: min(620px, 100%);
    background: var(--card);
    border-radius: 20px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    padding: 36px;
    position: relative;
    overflow: hidden;
    animation: fadeIn 400ms ease-out;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent-strong);
    background: rgba(31, 122, 107, 0.12);
    padding: 6px 12px;
    border-radius: 999px;
  }

  h1 {
    margin: 18px 0 8px;
    font-size: 26px;
    font-weight: 700;
  }

  p {
    margin: 0;
    color: var(--muted);
    line-height: 1.6;
  }

  .info {
    margin-top: 24px;
    padding: 18px;
    border-radius: 14px;
    border: 1px solid var(--border);
    background: rgba(246, 247, 249, 0.7);
    display: grid;
    gap: 12px;
  }

  .info-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    font-size: 15px;
  }

  .info-row dt {
    font-weight: 600;
    color: var(--muted);
  }

  .info-row dd {
    margin: 0;
    font-weight: 600;
  }

  .error {
    margin-top: 18px;
    padding: 12px 14px;
    border-radius: 12px;
    background: rgba(227, 81, 81, 0.12);
    color: #b12d2d;
    font-size: 14px;
    display: none;
  }

  .error.active {
    display: block;
  }

  .actions {
    margin-top: 28px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .btn {
    appearance: none;
    border: none;
    cursor: pointer;
    padding: 14px 18px;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    background: var(--accent);
    color: #fff;
    transition: transform 150ms ease, box-shadow 150ms ease, opacity 150ms ease;
  }

  .btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 10px 20px rgba(31, 122, 107, 0.2);
  }

  .btn:disabled {
    cursor: not-allowed;
    opacity: 0.6;
    transform: none;
    box-shadow: none;
  }

  .note {
    font-size: 13px;
    color: var(--muted);
  }

  @keyframes fadeIn {
    from {
      opacity: 0;
      transform: translateY(12px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @media (max-width: 520px) {
    .card {
      padding: 28px 22px;
    }

    h1 {
      font-size: 22px;
    }

    .info-row {
      flex-direction: column;
      align-items: flex-start;
    }
  }
</style>

<div class="page" id="migrate-root" data-member-id="" data-member-name="">
  <main class="card">
    <div class="badge">Cafe24 Link</div>
    <h1>카페24 계정을 연결할까요?</h1>
    <p>
      현재 로그인된 계정을 확인한 뒤, 계정 연결을 진행합니다.
      확인 후 아래 버튼을 눌러 주세요.
    </p>

    <dl class="info">
      <div class="info-row">
        <dt>아이디</dt>
        <dd id="member-id">불러오는 중</dd>
      </div>
      <div class="info-row">
        <dt>이름</dt>
        <dd id="member-name">불러오는 중</dd>
      </div>
    </dl>

    <div id="migrate-error" class="error" role="alert" aria-live="polite"></div>

    <div class="actions">
      <button id="continue-btn" class="btn" type="button">
        계정 연결하고 이동
      </button>
    </div>
  </main>
</div>
