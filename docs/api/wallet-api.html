
<!DOCTYPE html>

  <script src="https://unpkg.com/swagger-ui-dist@5.17.14/swagger-ui-standalone-preset.js"></script>
  <script>
    window.onload = function() {
      const ui = SwaggerUIBundle({
        spec: {
  "openapi": "3.0.0",
  "paths": {
    "/payments/intents": {
      "post": {
        "description": "새로운 결제 의도를 생성합니다. \n    \n**결제 의도(Payment Intent)란?**\n- 실제 결제 전에 결제할 의향을 나타내는 객체\n- 고객 정보, 금액, 결제 타입 등의 메타데이터를 포함\n- 이후 승인(authorize) → 캡처(capture) 단계로 진행\n\n**지원하는 결제 타입:**\n- `PAYMENT`: 일반 결제\n- `SUBSCRIPTION`: 정기 결제\n- `REFUND`: 환불\n\n**멱등성 보장:**\n- `Idempotency-Key` 헤더를 통해 중복 요청 방지\n- 동일한 키로 재요청 시 기존 결과 반환",
        "operationId": "PaymentController_createPaymentIntent",
        "parameters": [
          {
            "name": "Idempotency-Key",
            "required": false,
            "in": "header",
            "description": "멱등성 보장을 위한 고유 키 (선택사항)",
            "schema": {
              "type": "string"
            }
          }
        ],
        "requestBody": {
          "required": true,
          "description": "결제 의도 생성 요청",
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/CreateIntentDto"
              },
              "examples": {
                "payment": {
                  "summary": "일반 결제 의도",
                  "description": "단건 상품 구매를 위한 결제 의도",
                  "value": {
                    "customerId": "customer_12345",
                    "amount": 29900,
                    "type": "PAYMENT"
                  }
                },
                "subscription": {
                  "summary": "정기 결제 의도",
                  "description": "구독 서비스를 위한 정기 결제 의도",
                  "value": {
                    "customerId": "customer_67890",
                    "amount": 9900,
                    "type": "SUBSCRIPTION"
                  }
                }
              }
            }
          }
        },
        "responses": {
          "201": {
            "description": "결제 의도 생성 성공",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/IntentResponseDto"
                }
              }
            }
          },
          "400": {
            "description": "잘못된 요청 데이터",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ErrorResponseDto"
                }
              }
            }
          },
          "500": {
            "description": "서버 내부 오류",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ErrorResponseDto"
                }
              }
            }
          }
        },
        "summary": "결제 의도(Intent) 생성",
        "tags": [
          "결제 (Payments)"
        ]
      }
    },
    "/payments/intents/{intentId}": {
      "get": {
        "description": "결제 의도 ID로 상세 정보를 조회합니다.\n    \n**조회 가능한 정보:**\n- Intent 기본 정보 (ID, 고객 ID, 금액, 상태 등)\n- 생성/수정 시각\n- 메타데이터 (주문명, 상품 정보 등)\n- 현재 처리 상태\n\n**Intent 상태:**\n- `PENDING`: 생성됨, 결제 대기 중\n- `AUTHORIZED`: 승인 완료, 캡처 대기 중\n- `CAPTURED`: 결제 완료\n- `FAILED`: 결제 실패\n- `CANCELLED`: 취소됨",
        "operationId": "PaymentController_getIntent",
        "parameters": [
          {
            "name": "intentId",
            "required": true,
            "in": "path",
            "description": "결제 의도 ID",
            "schema": {
              "example": "intent_20250115_abc123",
              "type": "string"
            }
          }
        ],
        "responses": {
          "200": {
            "description": "Intent 조회 성공",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/IntentResponseDto"
                }
              }
            }
          },
          "404": {
            "description": "Intent를 찾을 수 없음",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ErrorResponseDto"
                }
              }
            }
          },
          "500": {
            "description": "서버 내부 오류",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ErrorResponseDto"
                }
              }
            }
          }
        },
        "summary": "결제 의도(Intent) 조회",
        "tags": [
          "결제 (Payments)"
        ]
      }
    },
    "/payments/intents/{intentId}/authorize": {
      "post": {
        "description": "결제 수단을 승인하여 결제 가능한 상태로 만듭니다.\n    \n**승인(Authorize)과 캡처(Capture)의 분리:**\n- **승인**: 결제 수단 유효성 검증 및 금액 홀드 (실제 차감 X)\n- **캡처**: 실제 금액 차감 및 정산 처리\n\n**지원 결제 제공자:**\n- `TOSS`: 토스페이먼츠 (테스트/운영 환경 지원)\n\n**Toss 결제 플로우:**\n1. 클라이언트에서 Toss SDK로 결제 수단 선택\n2. Toss에서 paymentKey 발급\n3. 이 API로 paymentKey 전달하여 승인 처리\n4. 별도 캡처 API로 실제 결제 완료\n\n**멱등성:**\n- 동일한 paymentKey로 재요청 시 기존 결과 반환",
        "operationId": "PaymentController_authorizePayment",
        "parameters": [
          {
            "name": "intentId",
            "required": true,
            "in": "path",
            "description": "결제 의도 ID",
            "schema": {
              "example": "intent_20250115_abc123",
              "type": "string"
            }
          },
          {
            "name": "Idempotency-Key",
            "required": false,
            "in": "header",
            "description": "멱등성 보장을 위한 고유 키 (선택사항)",
            "schema": {
              "type": "string"
            }
          }
        ],
        "requestBody": {
          "required": true,
          "description": "결제 승인 요청",
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/AuthorizePaymentDto"
              },
              "examples": {
                "toss": {
                  "summary": "Toss 결제 승인",
                  "description": "Toss SDK에서 받은 paymentKey로 승인 처리",
                  "value": {
                    "provider": "TOSS",
                    "paymentKey": "tgen_20250115123456_aB3Cd4Ef"
                  }
                }
              }
            }
          }
        },
        "responses": {
          "200": {
            "description": "결제 승인 성공",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/AuthorizePaymentResponseDto"
                }
              }
            }
          },
          "400": {
            "description": "잘못된 요청 또는 결제 승인 실패",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ErrorResponseDto"
                }
              }
            }
          },
          "404": {
            "description": "Intent를 찾을 수 없음",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ErrorResponseDto"
                }
              }
            }
          },
          "500": {
            "description": "서버 내부 오류",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ErrorResponseDto"
                }
              }
            }
          }
        },
        "summary": "결제 승인 (Authorize)",
        "tags": [
          "결제 (Payments)"
        ]
      }
    },
    "/payments/intents/{intentId}/capture": {
      "post": {
        "description": "승인된 결제를 실제로 정산 처리합니다.\n    \n**캡처(Capture)란?**\n- 승인 단계에서 홀드된 금액을 실제로 차감하는 과정\n- 캡처 완료 후 고객에게 실제 청구되며, 판매자에게 정산됨\n- 부분 캡처도 지원 (승인 금액보다 적은 금액 캡처 가능)\n\n**사용 시나리오:**\n- 상품 발송 완료 후 캡처 (배송 후 결제)\n- 서비스 제공 완료 후 캡처\n- 부분 취소 시 남은 금액만 캡처\n\n**부분 캡처:**\n- amount 파라미터로 캡처할 금액 지정\n- 미지정 시 승인된 전체 금액 캡처\n- 승인 금액보다 큰 금액 캡처는 불가\n\n**주의사항:**\n- 승인된 결제만 캡처 가능\n- 캡처 후에는 취소 불가 (환불만 가능)",
        "operationId": "PaymentController_capturePayment",
        "parameters": [
          {
            "name": "intentId",
            "required": true,
            "in": "path",
            "description": "결제 의도 ID",
            "schema": {
              "example": "intent_20250115_abc123",
              "type": "string"
            }
          },
          {
            "name": "Idempotency-Key",
            "required": false,
            "in": "header",
            "description": "멱등성 보장을 위한 고유 키 (선택사항)",
            "schema": {
              "type": "string"
            }
          }
        ],
        "requestBody": {
          "required": true,
          "description": "결제 캡처 요청",
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/CapturePaymentDto"
              },
              "examples": {
                "full": {
                  "summary": "전체 금액 캡처",
                  "description": "승인된 전체 금액을 캡처",
                  "value": {
                    "attemptId": "attempt_20250115_def456"
                  }
                },
                "partial": {
                  "summary": "부분 금액 캡처",
                  "description": "승인된 금액 중 일부만 캡처 (예: 29,900원 중 20,000원)",
                  "value": {
                    "attemptId": "attempt_20250115_def456",
                    "amount": 20000
                  }
                }
              }
            }
          }
        },
        "responses": {
          "200": {
            "description": "결제 캡처 성공",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/CapturePaymentResponseDto"
                }
              }
            }
          },
          "400": {
            "description": "잘못된 요청 또는 캡처 실패",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ErrorResponseDto"
                }
              }
            }
          },
          "404": {
            "description": "Intent 또는 Attempt를 찾을 수 없음",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ErrorResponseDto"
                }
              }
            }
          },
          "500": {
            "description": "서버 내부 오류",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ErrorResponseDto"
                }
              }
            }
          }
        },
        "summary": "결제 캡처 (Capture)",
        "tags": [
          "결제 (Payments)"
        ]
      }
    },
    "/payments/profiles": {
      "get": {
        "description": "사용자의 모든 결제 프로필을 조회합니다.\n    \n**반환 정보:**\n- 프로필 ID\n- 프로필 종류 (CARD, BANK_ACCOUNT, WALLET)\n- 결제 제공자 (HMS_CARD, HMS_BNPL, TOSS)\n- 프로필 상태\n- 상세 정보 (카드사, 마스킹된 번호 등)",
        "operationId": "PaymentController_getPaymentProfiles",
        "parameters": [],
        "responses": {
          "200": {
            "description": "결제 프로필 목록 조회 성공",
            "content": {
              "application/json": {
                "schema": {
                  "type": "array",
                  "items": {
                    "type": "object",
                    "properties": {
                      "id": {
                        "type": "string",
                        "description": "프로필 ID"
                      },
                      "kind": {
                        "type": "string",
                        "description": "프로필 종류"
                      },
                      "provider": {
                        "type": "string",
                        "description": "결제 제공자"
                      },
                      "status": {
                        "type": "string",
                        "description": "프로필 상태"
                      },
                      "name": {
                        "type": "string",
                        "description": "프로필 이름"
                      },
                      "details": {
                        "type": "object",
                        "description": "상세 정보"
                      },
                      "createdAt": {
                        "type": "string",
                        "description": "등록일시"
                      }
                    }
                  }
                }
              }
            }
          },
          "401": {
            "description": "인증 실패",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ErrorResponseDto"
                }
              }
            }
          }
        },
        "summary": "결제 프로필 목록 조회",
        "tags": [
          "결제 (Payments)"
        ]
      }
    },
    "/payments/profiles/hms-card": {
      "post": {
        "description": "HMS(Hyundai Motor Service) 카드 결제를 위한 프로필을 생성합니다.\n    \n**HMS 카드 프로필이란?**\n- 현대자동차 금융서비스 카드 결제를 위한 정보\n- 카드 번호, 유효기간, 비밀번호 등을 안전하게 저장\n- 이후 결제 시 프로필 ID로 간편 결제 가능\n\n**보안 처리:**\n- 민감한 카드 정보는 암호화하여 저장\n- PCI-DSS 규정에 따른 보안 처리\n- 카드 정보는 HMS 시스템에만 전달",
        "operationId": "PaymentController_createHmsCardProfile",
        "parameters": [],
        "requestBody": {
          "required": true,
          "description": "HMS 카드 프로필 생성 요청",
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/CreateHmsCardProfileDto"
              },
              "examples": {
                "hmsCard": {
                  "summary": "HMS 카드 프로필",
                  "value": {
                    "memberName": "김현대",
                    "phone": "01012345678",
                    "payerNumber": "901201",
                    "paymentNumber": "1234567890123456",
                    "payerName": "김현대",
                    "validYear": "28",
                    "validMonth": "12",
                    "validUntil": "2812",
                    "password": "12",
                    "paymentCompany": "HMC"
                  }
                }
              }
            }
          }
        },
        "responses": {
          "201": {
            "description": "HMS 카드 프로필 생성 성공",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/HmsCardProfileResponseDto"
                }
              }
            }
          },
          "400": {
            "description": "잘못된 카드 정보 또는 유효성 검증 실패",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ErrorResponseDto"
                }
              }
            }
          },
          "401": {
            "description": "인증 실패",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ErrorResponseDto"
                }
              }
            }
          },
          "500": {
            "description": "프로필 생성 중 서버 오류",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ErrorResponseDto"
                }
              }
            }
          }
        },
        "summary": "HMS 카드 프로필 생성",
        "tags": [
          "결제 (Payments)"
        ]
      }
    },
    "/payments/hms-bnpl/onboard": {
      "post": {
        "operationId": "PaymentController_onboardHmsBnplProfile",
        "parameters": [],
        "responses": {
          "201": {
            "description": ""
          }

        "summary": "HMS BNPL 프로필 및 동의서 등록",

    "/payments/bnpl/accounts": {
      "post": {
        "operationId": "PaymentController_createBnplAccount",
        "parameters": [],
        "requestBody": {
          "required": true,
          "content": {

        "responses": {
          "201": {

    "/payments/{intentId}/refund": {
      "post": {
        "description": "결제를 환불합니다.\n    \n**환불 처리 방식:**\n- 포인트와 현금을 비율에 따라 환불\n- 포인트는 즉시 복원\n- 현금은 결제 수단에 따라 환불\n\n**부분 환불:**\n- amount 파라미터로 환불 금액 지정\n- 미지정 시 전액 환불\n- 포인트:현금 비율은 원래 결제 비율과 동일\n\n**환불 비율 계산:**\n- 비율 = 환불금액 / 총금액\n- 포인트 환불 = floor(총포인트 * 비율)\n- 현금 환불 = 환불금액 - 포인트환불\n\n**BNPL 처리:**\n- AUTHORIZED 상태: void 처리 (출금 취소)\n- CAPTURED 상태: refund 처리 (환불)",
        "operationId": "PaymentController_refundPayment",
        "parameters": [
          {
            "name": "intentId",
            "required": true,
            "in": "path",
            "description": "환불할 결제 의도 ID",
            "schema": {
              "example": "intent_20250115_abc123",
              "type": "string"
            }
          },
          {
            "name": "Idempotency-Key",
            "required": false,
            "in": "header",
            "description": "멱등성 보장을 위한 고유 키 (선택사항)",
            "schema": {
              "type": "string"
            }
          }
        ],
        "requestBody": {
          "required": true,
          "description": "환불 요청",
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/RefundPaymentDto"
              },
              "examples": {
                "full": {
                  "summary": "전액 환불",
                  "description": "결제 전체를 환불",
                  "value": {
                    "reason": "CUSTOMER_REQUEST"
                  }
