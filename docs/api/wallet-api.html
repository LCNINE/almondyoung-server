            "nullable": true,
            "example": null

          "timestamp": {
            "type": "string",
            "description": "Response timestamp (ISO-8601)",

          "error",
          "timestamp"
        ]

        "properties": {
          "status": {

        "required": [
          "status"

      "WalletErrorResponseDto": {

          "message": {
            "type": "string",

            "example": "Request validation failed"

            "type": "string",

          "stack": {
            "type": "string",
            "description": "Stack trace returned in non-production environments",
            "example": "Error: Request validation failed"
          }
        },
        "required": [
          "success",
          "error",
          "message"
        ]
      },

            "type": "string",

            "enum": [

              "PARTIALLY_CAPTURED",

              "FAILED",
              "EXPIRED",
              "CANCELLED",
              "SUSPENDED",
              "SUPERSEDED",
              "RECONCILING",
              "SUPERSEDED_RECONCILE_REQUIRED",
              "RECONCILE_REQUIRED"

          "expiresAt": {
            "type": "string",
            "description": "Intent expiration time",
            "format": "date-time"
          },
          "version": {
            "type": "number",

            "minimum": 0

          "metadata": {
            "type": "object",

          },
          "createdAt": {
            "type": "string",
            "description": "Creation timestamp",
            "format": "date-time"
          },
          "updatedAt": {
            "type": "string",
            "description": "Last update timestamp",
            "format": "date-time"
          }

          "referenceId",
          "userId",
          "currency",
          "payableAmount",

          "expiresAt",
          "version",

          "updatedAt"

            "type": "string",
            "description": "Order discount kind",

              "ORDER"

          },
          "amount": {
            "type": "number",
