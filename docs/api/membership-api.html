          }

            "type": "object",

              "processedAt": {
                "type": "string"
              }
            },
            "required": [
              "processedAt"
            ],
            "additionalProperties": {},
            "x-nestjs_zod-has-null": true
          },
          "data": {
            "type": "object",
            "properties": {
              "id": {
                "type": "string",
                "format": "uuid",
                "pattern": "^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$"
              },
              "code": {
                "type": "string"
              },
              "name": {
                "anyOf": [
                  {
                    "type": "string"
                  },
                  {
                    "type": "null"
                  }
                ]
              },
              "priorityLevel": {
                "type": "number"
              },
              "createdAt": {
                "type": "string"
              },
              "updatedAt": {
                "type": "string"
              }
            },
            "required": [
              "id",
              "code",
              "name",
              "priorityLevel",
              "createdAt",
              "updatedAt"
            ],
            "x-nestjs_zod-has-null": true
          }
        },
        "required": [
          "success",
          "meta",
          "data"
        ]
      },
      "ErrorResponseDto": {
        "type": "object",
        "properties": {
          "success": {
            "type": "boolean",
            "const": false
          },
          "error": {
            "type": "object",
            "properties": {
              "message": {
                "type": "string"
              },
              "statusCode": {
                "type": "number"
              },
              "timestamp": {
                "type": "string"
              }

            "required": [

              "statusCode",
              "timestamp"

        "required": [

          "error"

            "minLength": 1,
            "maxLength": 50
          },
          "priorityLevel": {
            "type": "number",
            "minimum": 1,
            "maximum": 100
          }
        }
      },
      "CreatePlanRequestDto": {
        "type": "object",
        "properties": {

            "type": "string",
            "format": "uuid",
