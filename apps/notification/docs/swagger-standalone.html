    "title": "Notification Service API",

    "contact": {}
  },
  "tags": [
    {
      "name": "templates",
      "description": "템플릿 관리"

    {
      "name": "notifications",

    {
      "name": "providers",
      "description": "알림 제공업체 관리"
    },
    {
      "name": "bulk",
      "description": "대량 발송"
    },
    {
      "name": "dispatcher",
      "description": "알림 디스패처"
    },
    {
      "name": "event-handlers",
      "description": "이벤트 핸들러"
    }
  ],
  "servers": [],
  "components": {
    "securitySchemes": {
      "bearer": {
        "scheme": "bearer",
        "bearerFormat": "JWT",
        "type": "http"
      }
    },
    "schemas": {
      "SendNotificationDto": {
        "type": "object",
        "properties": {
          "userId": {
            "type": "string",
            "description": "사용자 ID",
            "example": "user-123"
          },
          "channels": {
            "type": "array",
            "description": "발송 채널 목록",
            "example": [
              "EMAIL",
              "KAKAO"
            ],
            "items": {
              "type": "string",
              "enum": [
                "EMAIL",
                "SMS",
                "KAKAO",
                "PUSH"
              ]
            }
          },
          "category": {
            "type": "string",
            "enum": [
              "TRANSACTIONAL",
              "MARKETING",
              "SYSTEM",
              "ADMIN",
              "OPERATIONAL",
              "CUSTOMER_SERVICE"
            ],
            "description": "알림 카테고리",
            "example": "TRANSACTIONAL"
          },
          "templateKey": {
            "type": "string",
            "description": "템플릿 키",
            "example": "order-confirmation-template"
          },
          "eventKey": {
            "type": "string",
            "description": "이벤트 키",
            "example": "order.created"
          },
          "content": {
            "type": "object",
            "description": "채널별 콘텐츠",
            "example": {
              "EMAIL": {
                "subject": "주문 확인",
                "body": "주문이 성공적으로 접수되었습니다.",
                "metadata": {
                  "orderId": "12345"
                }
              },
              "KAKAO": {
                "body": "주문이 성공적으로 접수되었습니다.",
                "metadata": {
                  "orderId": "12345"
                }
              }
            },
            "additionalProperties": true
          },
          "payload": {
            "type": "object",
            "description": "추가 페이로드 데이터",
            "example": {
              "orderId": "12345",
              "amount": 50000,
              "items": [
                "item1",
                "item2"
              ]
            },
            "additionalProperties": true
          },
          "variables": {
            "type": "object",
            "description": "템플릿 변수",
            "example": {
              "userName": "홍길동",
              "orderNumber": "ORD-12345",
              "totalAmount": "50,000원"
            },
            "additionalProperties": true
          },
          "correlationId": {
            "type": "string",
            "description": "상관관계 ID (트래킹용)",
            "example": "corr-12345"
          },
          "sendAt": {
            "type": "string",
            "description": "예약 발송 시간 (ISO 날짜 문자열)",
            "example": "2024-01-15T10:00:00Z"
          },
          "priority": {
            "type": "string",
            "enum": [
              "URGENT",
              "HIGH",
              "NORMAL",
              "LOW"
            ],
            "description": "알림 우선순위",
            "example": "HIGH"
          },
          "metadata": {
            "type": "object",
            "description": "추가 메타데이터",
            "example": {
              "source": "order-service",
              "version": "1.0"
            },
            "additionalProperties": true
          }
        },
        "required": [
          "userId",
          "channels",
          "category"
        ]
      },
      "CreateProviderDto": {
        "type": "object",
        "properties": {
          "channel": {
            "type": "string",
            "enum": [
              "EMAIL",
              "SMS",
              "KAKAO",
              "PUSH"
            ],
            "description": "알림 채널",
            "example": "EMAIL"
          },
          "providerName": {
            "type": "string",
            "description": "프로바이더 이름",
            "example": "sendgrid"
          },
          "config": {
            "type": "object",
            "description": "프로바이더별 설정",
            "example": {
              "apiKey": "your-api-key",
              "fromEmail": "noreply@example.com",
              "fromName": "Almond Young"
            },
            "additionalProperties": true
          },
          "isActive": {
            "type": "boolean",
            "description": "활성화 상태",
            "example": true,
            "default": true
          },
          "priority": {
            "type": "number",
            "description": "우선순위 (높을수록 우선)",
            "example": 0,
            "default": 0
          },
          "capabilities": {
            "type": "object",
            "description": "프로바이더 기능",
            "example": {
              "bulkSend": true,
              "scheduling": true,
              "tracking": true,
              "templating": true,
              "personalization": true,
              "maxRecipientsPerRequest": 1000,
              "rateLimit": {
                "requests": 100,
                "period": "1m"
              }
            },
            "additionalProperties": true
          },
          "metadata": {
            "type": "object",
            "description": "추가 메타데이터",
            "example": {
              "version": "1.0",
              "region": "us-east-1"
            },
            "additionalProperties": true
          }
        },
        "required": [
          "channel",
          "providerName",
          "config"
        ]
      },
      "UpdateProviderDto": {
        "type": "object",
        "properties": {
          "config": {
            "type": "object",
            "description": "프로바이더 설정",
            "example": {
              "apiKey": "new-api-key",
              "fromEmail": "new@example.com"
            },
            "additionalProperties": true
          },
          "status": {
            "type": "string",
            "enum": [
              "ACTIVE",
              "INACTIVE",
              "ERROR",
              "MAINTENANCE",
              "RATE_LIMITED"
            ],
            "description": "프로바이더 상태",
            "example": "ACTIVE"
          },
          "isActive": {
            "type": "boolean",
            "description": "활성화 상태",
            "example": true
          },
          "priority": {
            "type": "number",
            "description": "우선순위",
            "example": 1
          },
          "capabilities": {
            "type": "object",
            "description": "프로바이더 기능",
            "example": {
              "bulkSend": true,
              "scheduling": true,
              "tracking": true,
              "templating": true,
              "personalization": true,
              "maxRecipientsPerRequest": 1000,
              "rateLimit": {
                "requests": 100,
                "period": "1m"
              }
            },
            "additionalProperties": true
          },
          "metadata": {
            "type": "object",
            "description": "추가 메타데이터",
            "example": {
              "version": "1.1",
              "updatedBy": "admin"
            },
            "additionalProperties": true
          }
        }
      },
      "TestProviderDto": {
        "type": "object",
        "properties": {
          "providerId": {
            "type": "string",
            "description": "프로바이더 ID",
            "example": "provider-123"
          },
          "to": {
            "type": "string",
            "description": "테스트 수신자",
            "example": "test@example.com"
          },
          "subject": {
            "type": "string",
            "description": "테스트 제목",
            "example": "테스트 알림"
          },
          "content": {
            "type": "string",
            "description": "테스트 내용",
            "example": "이것은 테스트 메시지입니다."
          },
          "metadata": {
            "type": "object",
            "description": "추가 메타데이터",
            "example": {
              "testMode": true,
              "timestamp": "2024-01-15T10:00:00Z"
            },
            "additionalProperties": true
          }
        },
        "required": [
          "providerId",
          "to",
          "content"
        ]
      },
      "TestProviderResponseDto": {
        "type": "object",
        "properties": {
          "providerId": {
            "type": "string",
            "description": "프로바이더 ID",
            "example": "provider-123"
          },
          "providerName": {
            "type": "string",
            "description": "프로바이더 이름",
            "example": "SendGrid"
          },
          "channel": {
            "type": "string",
            "enum": [
              "EMAIL",
              "SMS",
              "KAKAO",
              "PUSH"
            ],
            "description": "채널",
            "example": "EMAIL"
          },
          "success": {
            "type": "boolean",
            "description": "성공 여부",
            "example": true
          },
          "messageId": {
            "type": "string",
            "description": "메시지 ID",
            "example": "msg-12345"
          },
          "error": {
            "type": "string",
            "description": "에러 메시지",
            "example": "Invalid API key"
          },
          "latencyMs": {
            "type": "number",
            "description": "응답 시간 (밀리초)",
            "example": 250
          },
          "timestamp": {
            "format": "date-time",
            "type": "string",
            "description": "테스트 시간",
            "example": "2024-01-15T10:00:00Z"
          },
          "providerResponse": {
            "type": "object",
            "description": "프로바이더 응답",
            "example": {
              "messageId": "msg-12345",
              "status": "sent"

            "additionalProperties": true
          }
        },
        "required": [

          "providerName",
          "channel",
          "success",
          "latencyMs",
          "timestamp"
        ]
      },
      "FCMNotificationConfig": {
