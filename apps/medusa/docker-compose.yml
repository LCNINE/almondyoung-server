version: '3.8'
services:
  postgres:
    image: postgres:latest
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - medusa_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:latest
    ports:
      - '6379:6379'
    volumes:
      - medusa_redis_data:/data

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.3
    ports:
      - '2181:2181'
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.3
    ports:
      - '9092:9092'
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # 로컬과 도커 내부 양쪽에서 접속 가능하도록 설정
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper

  medusa:
    build:
      context: ../..
      dockerfile: apps/medusa/Dockerfile
    ports:
      - '9000:9000'
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/postgres
      REDIS_URL: redis://redis:6379
      # Kafka 사용 설정
      USE_KAFKA: "1" 
      KAFKA_BROKERS: kafka:29092 
      # Kafka 경고 숨기기
      KAFKAJS_NO_PARTITIONER_WARNING: "1"
      # 기타 설정
      NODE_ENV: production
      JWT_SECRET: supersecret
      COOKIE_SECRET: supersecret
      STORE_CORS: http://localhost:8000
      ADMIN_CORS: http://localhost:9000
      AUTH_CORS: http://localhost:9000
    depends_on:
      - postgres
      - redis
      - kafka
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    ports:
      - '5050:80'
    environment:
      PGADMIN_DEFAULT_EMAIL: jungsik.jeong@lcnine.kr
      PGADMIN_DEFAULT_PASSWORD: 123123123
    depends_on:
      - postgres

volumes:
  medusa_postgres_data:
  medusa_redis_data:
