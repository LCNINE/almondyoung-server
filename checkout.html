<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Test Checkout - V2 API</title>
  </head>

  <body>
    <h2>Create Payment Session (V2)</h2>
    <label>Amount: <input id="amount" type="number" value="129000" /></label>
    <label>Currency: <input id="currency" value="KRW" /></label>
    <button id="create">Create Session</button>
    <pre id="log"></pre>
    <script>
      const API_BASE = 'http://localhost:5000'; // 지갑 API 주소
      const RETURN_URL = 'http://localhost:5500/redirect.html';

      const log = (m) =>
        (document.getElementById('log').textContent += m + '\n');

      document.getElementById('create').onclick = async () => {
        const amount = Number(document.getElementById('amount').value);
        const currency = document.getElementById('currency').value.trim();
        try {
          // ✅ V2 API 사용
          const resp = await fetch(API_BASE + '/v2/sessions', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Idempotency-Key': 'idem_create_' + Date.now(),
            },
            body: JSON.stringify({
              userId: 'user_test_123', // ✅ 반드시 문자열
              amount,
              currency,
              metadata: { returnUrl: RETURN_URL },
            }),
          });
          const data = await resp.json();
          log('Session: ' + JSON.stringify(data, null, 2));
          if (!resp.ok) {
            alert('Create failed: ' + data.message);
            return;
          }

          // ✅ design.md 스타일: checkout URL 사용
          if (data.checkout && data.checkout.url) {
            log('Redirecting to: ' + data.checkout.url);
            location.href = data.checkout.url;
          } else {
            // 폴백: 직접 URL 구성
            const checkoutUrl = `./checkout-v2.html?sessionId=${data.sessionId}&returnUrl=${encodeURIComponent(RETURN_URL)}`;
            log('Fallback redirect to: ' + checkoutUrl);
            location.href = checkoutUrl;
          }
        } catch (e) {
          alert('Error: ' + e);
        }
      };
    </script>
  </body>
</html>
